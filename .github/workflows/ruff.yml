name: ruff CI 

on: 
    push:
        branches:
            - dev

jobs: 
    ruff: 
        runs-on: ubuntu-latest

        steps:
            - name: checkout repo
              uses: actions/checkout@v4            

            - name: setup python
              uses: actions/setup-python@v5
              with: 
                python-version: "3.12"
            - name: install ruff
              run: pip install ruff
              
            - name: lint
              run: ruff check .

            - name: format check
              run: ruff format --check

            - name: formating
              run: ruff format
            