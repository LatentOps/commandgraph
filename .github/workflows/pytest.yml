name: pytest CI

on: 
    push

jobs:

    pytest:
        runs-on: ubuntu-latest

        steps:

            - name: checkout repo
              uses: actions/checkout@v6            

            - name: setup python
              uses: actions/setup-python@v6

              with:
                python-version: "3.12"

            - name: install pytest
              run: pip install pytest

            - name: run pytest
              run: pytest -v